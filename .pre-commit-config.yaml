repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: ruff check .
        language: system
        pass_filenames: false
      - id: ruff-format-check
        name: ruff format check
        entry: ruff format --check .
        language: system
        pass_filenames: false
      - id: mypy-src
        name: mypy src
        entry: mypy src
        language: system
        pass_filenames: false
      - id: pytest-smoke
        name: pytest smoke
        entry: pytest tests/unit tests/test_healthcheck.py tests/test_reference_loaders.py
        language: system
        pass_filenames: false

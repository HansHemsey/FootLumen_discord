<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-label="FootLumen visual identity asset">

  <defs>
    <linearGradient id="fl-blue-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#123B73"/>
      <stop offset="100%" stop-color="#0A244A"/>
    </linearGradient>
    <linearGradient id="fl-accent-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22C7E8"/>
      <stop offset="100%" stop-color="#27C77A"/>
    </linearGradient>
    <radialGradient id="fl-halo" cx="50%" cy="45%" r="60%">
      <stop offset="0%" stop-color="#22C7E8" stop-opacity="0.28"/>
      <stop offset="55%" stop-color="#22C7E8" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#22C7E8" stop-opacity="0"/>
    </radialGradient>
    <filter id="fl-soft-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
  </defs>


  <circle cx="256" cy="256" r="203" fill="none" stroke="#111827" stroke-width="14" stroke-linecap="round" stroke-dasharray="530 300" transform="rotate(-42 256 256)"/>
  <text x="250" y="310" text-anchor="middle" font-family="'DejaVu Sans', 'Arial', sans-serif" font-size="168" font-weight="850" letter-spacing="-14" fill="#111827">FL</text>
  <path d="M152 345 H360" stroke="#111827" stroke-width="14" stroke-linecap="round"/>

</svg>
